<header class="print-clinic-header">
  <div class="header-side header-left">
    @if (logoUrl()) {
      <img [src]="logoUrl()" alt="Logo clínica" class="clinic-logo"/>
    }
  </div>
  <div class="clinic-info">
    <h1>{{ clinic.name }}</h1>
    @if (contactLine) { <p class="contact-line">{{ contactLine }}</p> }
    @if (documentTitle) {
      <p class="doc-title">{{ documentTitle }}@if (issuedDate) { <span class="doc-date"> · {{ issuedDate }}</span> }</p>
    }
  </div>
  <div class="header-side header-right">
    <img src="assets/mydentalsys-logo.svg" alt="My Dental Sys" class="system-logo"/>
  </div>
</header>
