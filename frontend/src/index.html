<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>DentalSys - Sistema de Gestión Clínica Dental</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><path d='M16 2C10 2 5 7 5 13c0 4 1.5 7.5 3.5 10L16 30l7.5-7C25.5 20.5 27 17 27 13c0-6-5-11-11-11z' fill='%232b6cb0'/></svg>">
  <script>
    // Muestra en pantalla cualquier error que impida arrancar la app (en vez de quedar en blanco sin pistas).
    // Útil en dispositivos donde no hay forma de abrir la consola del navegador.
    window.__showBootError = function (err) {
      try {
        var msg = (err && (err.message || (err.reason && err.reason.message) || err.toString)) ? (err.message || (err.reason && err.reason.message) || err.toString()) : String(err);
        var box = document.getElementById('boot-error-overlay');
        if (!box) {
          box = document.createElement('div');
          box.id = 'boot-error-overlay';
          box.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:999999;background:#b91c1c;color:#fff;' +
            'font:12px/1.4 monospace;padding:10px 34px 10px 10px;max-height:50vh;overflow:auto;white-space:pre-wrap;word-break:break-word;';
          var close = document.createElement('button');
          close.textContent = '×';
          close.setAttribute('aria-label', 'Cerrar');
          close.style.cssText = 'position:absolute;top:4px;right:8px;background:transparent;border:none;color:#fff;font-size:20px;cursor:pointer;';
          close.onclick = function () { box.style.display = 'none'; };
          box.appendChild(close);
          var text = document.createElement('div');
          text.id = 'boot-error-overlay-text';
          box.appendChild(text);
          document.body.appendChild(box);
        }
        box.style.display = 'block';
        var textEl = document.getElementById('boot-error-overlay-text');
        textEl.textContent += (textEl.textContent ? '\n\n' : '') + 'Error al cargar la aplicación:\n' + msg;
      } catch (e) { /* si esto falla, no hay mucho más que hacer */ }
    };
    window.addEventListener('error', function (e) { window.__showBootError(e.error || e.message || e); });
    window.addEventListener('unhandledrejection', function (e) { window.__showBootError(e.reason || e); });
  </script>
</head>
<body>
  <app-root></app-root>
</body>
</html>
