# Construye las imágenes dev de los dos frontends en los runners de GitHub y
# las publica en GitHub Container Registry (ghcr.io). Existe porque la red
# corporativa donde se desarrolla bloquea registry.npmjs.org (control de
# aplicaciones del firewall): `npm install` no puede correr ahí, así que corre
# acá — fuera de esa red — y la PC de desarrollo solo hace `docker compose
# pull frontend admin-frontend`, que sí está permitido (ghcr.io verificado
# accesible desde esa red, 2026-07-16).
#
# No necesita secrets: GITHUB_TOKEN autentica contra ghcr.io del mismo repo.
# El backend queda afuera a propósito: construye bien en esa red (apt/pip no
# están bloqueados) y no hace falta publicarlo.
#
# Los paquetes se crean PRIVADOS en el primer push — hay que hacerlos públicos
# una sola vez (página del package en GitHub > Package settings > Change
# visibility > Public) para que el pull anónimo funcione desde cualquier lado.
#
# Cuando cambian dependencias, en la PC bloqueada:
#   docker compose pull frontend admin-frontend
#   docker compose down
#   docker volume rm dental-sys_frontend_node_modules dental-sys_admin_frontend_node_modules
#   docker compose up -d          # sin --build
name: build-frontend-images

on:
  # Botón "Run workflow" manual en la pestaña Actions (aparece cuando este
  # archivo llega a la rama default, main).
  workflow_dispatch:
  # Sin filtro de rama a propósito (desarrollo en solitario con ramas de
  # feature cambiantes): cualquier push que toque las dependencias o los
  # Dockerfiles de los frontends regenera el tag :dev. El código fuente llega
  # al contenedor por bind mount (docker-compose.yml), así que un push que
  # solo toca .ts/.html no necesita imagen nueva y no dispara nada.
  push:
    paths:
      - "frontend/package*.json"
      - "frontend/Dockerfile"
      - "admin-frontend/package*.json"
      - "admin-frontend/Dockerfile"
      - ".github/workflows/build-images.yml"

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - context: frontend
            image: dental-frontend
          - context: admin-frontend
            image: dental-admin-frontend
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.context }}
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:dev
          # Caché de capas entre corridas: si package.json no cambió, la capa
          # de npm install se reutiliza y el build baja a ~1 minuto. scope
          # separado por app para que las dos builds del matrix no se pisen.
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
