services:
  # Postgres LOCAL opcional, para redes que bloquean el puerto 5432 saliente
  # (p. ej. la red corporativa donde a veces se desarrolla — ahí Supabase es
  # inalcanzable). NO arranca con `docker compose up` normal: requiere
  # `docker compose --profile localdb up -d`, con el .env apuntando a este
  # servicio (host `db`, ver .env.example). El flujo por defecto (base de
  # testing compartida en Supabase) queda intacto.
  # Credenciales fijas de desarrollo local: el puerto no se publica al host,
  # solo es alcanzable desde la red interna de compose. El init-script crea
  # el rol restringido dental_app (mismo esquema de dos roles que Supabase —
  # RLS no aplica al dueño de las tablas, ver CLAUDE.md).
  db:
    image: postgres:16-alpine
    container_name: dental_db
    profiles: ["localdb"]
    restart: unless-stopped
    environment:
      POSTGRES_USER: dental_user
      POSTGRES_PASSWORD: dental_pass
      POSTGRES_DB: dental_clinic_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/create_app_role.sql:/docker-entrypoint-initdb.d/10_create_app_role.sql:ro

  backend:
    build: ./backend
    container_name: dental_backend
    restart: unless-stopped
    environment:
      FLASK_APP: run.py
      FLASK_ENV: development
      FLASK_DEBUG: "1"
      SECRET_KEY: dev-secret-change-in-prod
      # Ambiente de testing compartido en Supabase — NO el Postgres local.
      # Los valores reales van en un archivo .env en la RAÍZ del repo
      # (gitignored, ver .env.example) — NO hardcodear acá: docker-compose.yml
      # está en el repo público. Se setean UNA vez; después "docker compose up"
      # ya migra y corre solo contra esa base cada vez.
      DATABASE_URL: ${DATABASE_URL}
      MIGRATIONS_DATABASE_URL: ${MIGRATIONS_DATABASE_URL}
      JWT_SECRET_KEY: jwt-secret-change-in-prod
      JWT_ACCESS_TOKEN_EXPIRES: "14400"
      JWT_REFRESH_TOKEN_EXPIRES: "2592000"
      CORS_ORIGINS: http://localhost:4200,http://localhost:4300
      # Supabase Storage para fotos clínicas (FCLI-10). Si no están seteadas,
      # los endpoints de imágenes responden 503.
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY:-}
      SUPABASE_STORAGE_BUCKET: ${SUPABASE_STORAGE_BUCKET:-treatment-images}
      # Usados solo por el wait-loop de entrypoint.sh (pg_isready) antes de
      # migrar — deben apuntar al mismo host/puerto/usuario del pooler que
      # MIGRATIONS_DATABASE_URL.
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER}
      # Gunicorn worker/thread count + SQLAlchemy pool size — see
      # backend/.env.example for the reasoning and suggested values per tier.
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-2}
      WEB_THREADS: ${WEB_THREADS:-2}
      WEB_TIMEOUT: ${WEB_TIMEOUT:-60}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-3}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-2}
      DB_POOL_TIMEOUT: ${DB_POOL_TIMEOUT:-30}
      DB_POOL_RECYCLE: ${DB_POOL_RECYCLE:-280}
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    # Imagen publicada por .github/workflows/build-images.yml (los runners de
    # GitHub construyen donde npm no está bloqueado). En una red que bloquea
    # registry.npmjs.org: `docker compose pull frontend` y luego `up -d` SIN
    # --build. En una red normal, `docker compose build frontend` sigue
    # funcionando y produce una imagen local con este mismo nombre.
    image: ghcr.io/davidquinteros/dental-frontend:dev
    container_name: dental_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "4200:4200"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

  admin-frontend:
    build: ./admin-frontend
    # Ver comentario en el servicio frontend — mismo flujo via ghcr.io.
    image: ghcr.io/davidquinteros/dental-admin-frontend:dev
    container_name: dental_admin_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "4300:4300"
    volumes:
      - ./admin-frontend:/app
      - admin_frontend_node_modules:/app/node_modules

volumes:
  postgres_data:
  frontend_node_modules:
  admin_frontend_node_modules:
