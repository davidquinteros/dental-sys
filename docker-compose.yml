services:
  db:
    image: postgres:15-alpine
    container_name: dental_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: dental_clinic_db
      POSTGRES_USER: dental_user
      POSTGRES_PASSWORD: dental_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dental_user -d dental_clinic_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: dental_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      FLASK_APP: run.py
      FLASK_ENV: development
      FLASK_DEBUG: "1"
      SECRET_KEY: dev-secret-change-in-prod
      # Runtime traffic uses a restricted, non-superuser role so Row Level
      # Security (see migration a3f9c2d81e47) actually applies to it.
      DATABASE_URL: postgresql://dental_app:dental_app_password@db:5432/dental_clinic_db
      # Migrations need DDL/ownership privileges, so they run as the
      # superuser role instead — see entrypoint.sh.
      MIGRATIONS_DATABASE_URL: postgresql://dental_user:dental_password@db:5432/dental_clinic_db
      JWT_SECRET_KEY: jwt-secret-change-in-prod
      JWT_ACCESS_TOKEN_EXPIRES: "3600"
      JWT_REFRESH_TOKEN_EXPIRES: "2592000"
      CORS_ORIGINS: http://localhost:4200,http://localhost:4300
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_USER: dental_user
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    container_name: dental_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "4200:4200"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

  admin-frontend:
    build: ./admin-frontend
    container_name: dental_admin_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "4300:4300"
    volumes:
      - ./admin-frontend:/app
      - admin_frontend_node_modules:/app/node_modules

volumes:
  postgres_data:
  frontend_node_modules:
  admin_frontend_node_modules:
